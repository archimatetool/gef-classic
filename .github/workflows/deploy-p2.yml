name: Deploy p2 repository

on:
  push:
    branches: [ archi ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout required branch
        uses: actions/checkout@v6
        with:
          ref: archi
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Maven
        uses: stCarolas/setup-maven@v5.1
        with:
           maven-version: 3.9.12

      - name: Build with maven
        run: mvn clean package -DskipTests -U

      - name: Copy p2 repository
        run: |
          mkdir -p public/p2
          cp -r org.eclipse.gef.repository/target/repository/* public/p2/

      - name: Generate directory listing
        uses: jayanta525/github-pages-directory-listing@v4.0.0
        with:
          FOLDER: public

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Show URL
        run: echo "p2 Repository → https://archimatetool.github.io/gef-classic/p2/"
